<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1a1d2e"/>

  <!-- Ascending bar chart (left to right, getting taller) -->
  <rect x="8"  y="44" width="12" height="14" rx="3" fill="#3b82c4" opacity="0.65"/>
  <rect x="26" y="30" width="12" height="28" rx="3" fill="#3b82c4" opacity="0.85"/>
  <rect x="44" y="16" width="12" height="42" rx="3" fill="#22c55e"/>

  <!-- Signal pulse ring around the dot -->
  <circle cx="50" cy="12" r="7" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.45"/>

  <!-- Signal dot -->
  <circle cx="50" cy="12" r="4" fill="#f59e0b"/>
</svg>
